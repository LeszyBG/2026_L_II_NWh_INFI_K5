version: 2.1

jobs:
  build-and-test:
    machine:
      image: ubuntu-2004:current
      docker_layer_caching: true

    steps:
      - checkout
      - run:
          command: make deps
      - run:
          command: make lint
      - run:
          command: make test
      - run:
          command: docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKER_PASSWORD"
      - run:
          command: docker info
      - run:
          command: make docker_build
      - run:
          command: make docker_push

workflows:
  basic:
    jobs:
      - build-and-test
